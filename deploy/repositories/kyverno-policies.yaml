apiVersion: repo.github.m.upbound.io/v1alpha1
kind: Repository
metadata:
  name: kyverno-policies
  annotations:
    # Adopted repo. The provider CRD cannot represent the org's 5 required
    # custom properties, so the initial org-admin bootstrap had to set them
    # through GitHub's API. The intended classification is Type=Library; see
    # https://github.com/devantler-tech/.github/issues/97 for the exact
    # property contract and the remaining provider gap. This CR manages every
    # representable setting declaratively after adoption.
    # external-name pinned so the create/observe target is unambiguous.
    crossplane.io/external-name: kyverno-policies
spec:
  # Same all-except-Delete policy as every other managed repo (omitting Delete
  # guarantees Crossplane can never delete a real GitHub repository).
  managementPolicies:
    - Observe
    - Create
    - Update
    - LateInitialize
  forProvider:
    name: kyverno-policies
    description: "Shared Kyverno policy library for the devantler-tech platforms — the single source the platform and platform-template consume instead of vendoring per-repo copies."
    visibility: public
    hasIssues: true
    # Shared kustomization patch supplies the squash-only merge policy +
    # webCommitSignoffRequired; nothing repo-specific needed here.
  providerConfigRef:
    kind: ProviderConfig
    name: default
---
apiVersion: repo.github.m.upbound.io/v1alpha1
kind: DefaultBranch
metadata:
  name: kyverno-policies
  annotations:
    # The Repository CRD's defaultBranch field is deprecated; manage the
    # already-existing main branch through the dedicated resource instead.
    crossplane.io/external-name: kyverno-policies
spec:
  managementPolicies:
    - Observe
    - Create
    - Update
    - LateInitialize
  forProvider:
    branch: main
  providerConfigRef:
    kind: ProviderConfig
    name: default
