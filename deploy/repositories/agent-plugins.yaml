apiVersion: repo.github.m.upbound.io/v1alpha1
kind: Repository
metadata:
  name: agent-plugins
  annotations:
    # Adopts the agent-plugins repo directly (renamed from plugins). Fresh MR:
    # the old "plugins" MR is pruned (orphans the repo — no Delete in
    # managementPolicies, never deletes) and this one adopts via the correct
    # external-name, so the provider observes directly and reconciles cleanly.
    crossplane.io/external-name: agent-plugins
spec:
  # Squash-only merge policy + webCommitSignoffRequired come from the shared
  # patch; everything else is adopted via LateInitialize.
  managementPolicies:
    - Observe
    - Create
    - Update
    - LateInitialize
  forProvider:
    name: agent-plugins
  providerConfigRef:
    kind: ProviderConfig
    name: default
