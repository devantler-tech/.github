# Active Admins-team membership, managed without claiming Delete.
apiVersion: team.github.m.upbound.io/v1alpha1
kind: TeamMembership
metadata:
  name: admins-devantler
spec:
  managementPolicies: ["Observe", "Create", "Update", "LateInitialize"]
  forProvider:
    teamIdRef:
      name: admins
    username: devantler
    role: maintainer
  providerConfigRef:
    kind: ProviderConfig
    name: default
