# Require status checks to pass - CodeRabbit — a net-new, actually-managed org ruleset
# (like protect-release-tags.yaml; NOT an Observe import, so it has no external-name).
# Named/grouped under the "require-status-checks" concern: a dedicated managed ruleset
# rather than folding into the Observe-only require-status-checks.yaml import (promoting
# that import is a lossy round-trip — see ./README.md and the bypassActors note below).
#
# CodeRabbit (the `coderabbitai` GitHub App, installed org-wide) posts a commit
# status named `CodeRabbit` once it has reviewed a PR. This `OrganizationRuleset`
# makes that status a REQUIRED check on the default branch of every repo, so a PR
# cannot merge until CodeRabbit has published its review.
#   - target: branch; conditions ~DEFAULT_BRANCH on ~ALL repos — mirrors the sibling
#     "Require status checks to pass" ruleset's scope (every PR merges into default).
#   - requiredStatusChecks → requiredCheck context `CodeRabbit` (exact, case-sensitive
#     status context); strictRequiredStatusChecksPolicy: false to match that sibling
#     (don't force branch-up-to-date — the org already auto-suggests updating PR branches).
#
# Net-new like protect-release-tags.yaml: managed (Observe + Create + Update +
# LateInitialize, never Delete) — Crossplane CREATES it on first reconcile, then syncs.
#
# bypassActors: OrganizationAdmin/always (actorId 0 — the round-trip-safe form observed
# on the sibling "Require status checks to pass" ruleset). Kept as an escape hatch: an
# org-wide required check would otherwise block ALL merges during a CodeRabbit outage,
# and v0.19.1 cannot express the API's `do_not_enforce_on_create` (so the rule is
# enforced from branch creation too). Remove this block for a no-bypass gate. To reject
# a spoofed `CodeRabbit` status from another source, add `integrationId: <coderabbit
# app id>` under requiredCheck (the sibling ruleset leaves it unpinned, so this does too).
apiVersion: enterprise.github.m.upbound.io/v1alpha1
kind: OrganizationRuleset
metadata:
  name: require-status-checks-coderabbit-review
spec:
  managementPolicies:
    - Observe
    - Create
    - Update
    - LateInitialize
  forProvider:
    name: Require status checks to pass - CodeRabbit
    target: branch
    enforcement: active
    conditions:
      - refName:
          - include: ["~DEFAULT_BRANCH"]
            exclude: []
        repositoryName:
          - include: ["~ALL"]
            exclude: []
    rules:
      - requiredStatusChecks:
          - requiredCheck:
              - context: CodeRabbit
            strictRequiredStatusChecksPolicy: false
    bypassActors:
      - actorId: 0
        actorType: OrganizationAdmin
        bypassMode: always
  providerConfigRef:
    kind: ProviderConfig
    name: default
