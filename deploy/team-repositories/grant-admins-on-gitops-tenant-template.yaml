# Admins-team repository grant. No external-name is set because the separate
# team and its admin grant are created declaratively without claiming Delete.
apiVersion: team.github.m.upbound.io/v1alpha1
kind: TeamRepository
metadata:
  name: admins-gitops-tenant-template
spec:
  managementPolicies: ["Observe", "Create", "Update", "LateInitialize"]
  forProvider:
    teamIdRef:
      name: admins
    repository: gitops-tenant-template
    permission: admin
  providerConfigRef:
    kind: ProviderConfig
    name: default
