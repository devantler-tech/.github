# Active administrative team for explicit repository-admin grants. The policy
# creates and updates the team without claiming Delete.
apiVersion: team.github.m.upbound.io/v1alpha1
kind: Team
metadata:
  name: admins
spec:
  managementPolicies: ["Observe", "Create", "Update", "LateInitialize"]
  forProvider:
    createDefaultMaintainer: false
    description: Repository administrators for the devantler-tech portfolio
    name: Admins
    privacy: secret
  providerConfigRef:
    kind: ProviderConfig
    name: default
