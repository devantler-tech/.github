# The `maintainers` team — the canonical CODEOWNERS owner across the devantler-tech
# suite (the "teams over individuals" convention), adopted Observe-first (read-only).
# Its membership and team → repository access live one-per-file in the sibling
# maintainers-*.yaml files.
apiVersion: team.github.m.upbound.io/v1alpha1
kind: Team
metadata:
  name: maintainers
  annotations:
    # Adopt the EXISTING devantler-tech/maintainers team (read-only). provider-github
    # imports a Team by its NUMERICAL id, not its slug — a slug external-name fails
    # observe with `Unexpected ID format ("maintainers"), expected numerical ID`. The
    # team id is stable; `forProvider.name` keeps the slug as the human-readable name.
    crossplane.io/external-name: "17046606"
spec:
  managementPolicies: ["Observe"]
  forProvider:
    name: maintainers
  providerConfigRef:
    kind: ProviderConfig
    name: default
