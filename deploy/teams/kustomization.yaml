# The `maintainers` team — the canonical CODEOWNERS owner across the devantler-tech
# suite (the "teams over individuals" convention). One resource per file: the Team
# (Observe-adopted by numeric id), its membership, and its team → repository access
# grants. Existing access is adopted Observe-first; access the team did not yet hold is
# Created at `maintain`. See ../README.md and the platform repo's docs/github-management.md
# for the Observe-first adoption flow. Grant a new repo by dropping a
# maintainers-<repo>.yaml here and listing it below.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - maintainers.yaml
  - maintainers-devantler.yaml
  # Team → repository access (Observe-adopted).
  - maintainers-actions.yaml
  - maintainers-dotnet-template.yaml
  - maintainers-go-template.yaml
  - maintainers-ksail.yaml
  - maintainers-monorepo.yaml
  - maintainers-platform.yaml
  - maintainers-reusable-workflows.yaml
  # Team → repository access (Created — grant did not exist yet).
  - maintainers-gitops-tenant-template.yaml
  - maintainers-platform-template.yaml
  - maintainers-unifi.yaml
  - maintainers-homebrew-tap.yaml
