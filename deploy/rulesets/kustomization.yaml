# Org & repository rulesets as Crossplane managed resources (provider-upjet-github).
# One resource per file. 12 existing rulesets are adopted Observe-first (read-only)
# and 1 net-new tag ruleset is managed (Create). The 10 org rulesets the provider
# cannot express remain UI-managed — see ./README.md for the full importability
# matrix and the push/tag/Actions-policy analysis. Included by ../kustomization.yaml.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Org rulesets — adopted Observe-first (read-only).
  - block-force-pushes.yaml
  - require-pull-request.yaml
  - require-conversation-resolution.yaml
  - require-linear-history.yaml
  - require-signed-commits.yaml
  - require-status-checks.yaml
  - restrict-deletions.yaml
  - restrict-branch-names.yaml
  - restrict-commit-metadata.yaml
  - require-workflows-dependency-review.yaml
  # Repository rulesets — adopted Observe-first (read-only).
  - ksail-restrict-deletions.yaml
  - platform-require-merge-queue.yaml
  # Net-new, managed (Create).
  - protect-release-tags.yaml
