# Newer "Require workflows to pass" rule (API rule type `workflows`, exposed by the
# provider as `requiredWorkflows`). Only the org-wide DependencyReview variant is
# importable — it conditions on repository_name `~ALL`. The other "Require
# workflows …" rulesets condition on repository_property (custom properties), which
# the provider cannot express; they stay UI-managed (see ./README.md).
apiVersion: enterprise.github.m.upbound.io/v1alpha1
kind: OrganizationRuleset
metadata:
  name: require-workflows-dependency-review
  annotations:
    crossplane.io/external-name: "17213449"
spec:
  managementPolicies: ["Observe"]
  forProvider:
    name: Require workflows to pass before merging - DependencyReview
    target: branch
    enforcement: active
  providerConfigRef:
    kind: ProviderConfig
    name: default
