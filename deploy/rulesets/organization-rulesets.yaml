# Org-level rulesets — adopted Observe-first (read-only).
#
# These bind the org's EXISTING UI-created organization rulesets to Crossplane
# `OrganizationRuleset` managed resources (provider-upjet-github, terraform
# github_organization_ruleset). `managementPolicies: ["Observe"]` means Crossplane
# only MIRRORS live state into status.atProvider — it never writes, never reverts,
# never deletes. This brings the org's branch-protection posture under GitOps
# VISIBILITY with zero behaviour change, exactly how repositories/ and teams/ were
# adopted (see ../README.md and the platform repo's docs/github-management.md).
#
# external-name = the numeric ruleset ID (the provider's terraform import id:
# `terraform import github_organization_ruleset.example <id>`). Find an id with
# `gh api orgs/devantler-tech/rulesets`.
#
# forProvider is intentionally MINIMAL (identity only: name/target/enforcement) —
# Observe never reads it. Do NOT add the full rules/conditions/bypassActors here
# and do NOT promote managementPolicies past Observe without FIRST backfilling
# forProvider from the observed `status.atProvider` (the provider's round-trip is
# lossy; a partial forProvider under Update would wipe live rules). The rules/
# README documents this and the importability matrix.
#
# Only the 10 org rulesets the provider can FAITHFULLY express live here. The other
# 10 (repository_property conditions, code_quality/copilot_code_review rule types,
# and repository-target rulesets) are NOT expressible by provider-upjet-github
# v0.19.1 and remain UI-managed — see ./README.md and the tracking issue.
apiVersion: enterprise.github.m.upbound.io/v1alpha1
kind: OrganizationRuleset
metadata:
  name: block-force-pushes
  annotations:
    crossplane.io/external-name: "6986186"
spec:
  managementPolicies: ["Observe"]
  forProvider:
    name: Block force pushes
    target: branch
    enforcement: active
  providerConfigRef:
    kind: ProviderConfig
    name: default
---
