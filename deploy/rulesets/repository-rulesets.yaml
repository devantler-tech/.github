# Repository-level rulesets — adopted Observe-first (read-only).
#
# Two repos carry their OWN ruleset (beyond the inherited org rulesets), bound here
# to Crossplane `RepositoryRuleset` managed resources (provider-upjet-github,
# terraform github_repository_ruleset). As with the org rulesets,
# `managementPolicies: ["Observe"]` is read-only — Crossplane mirrors live state and
# never writes. external-name = `<repository>:<ruleset_id>` (the provider's terraform
# import id: `terraform import github_repository_ruleset.example <repo>:<id>`) —
# matching the `maintainers:<repo>` convention already used in ../teams/maintainers.yaml.
#
# forProvider is identity-only (repository/name/target/enforcement); see the warning
# in ./organization-rulesets.yaml before promoting past Observe.
apiVersion: repo.github.m.upbound.io/v1alpha1
kind: RepositoryRuleset
metadata:
  name: ksail-restrict-deletions
  annotations:
    # ksail's own "Restrict deletions" rule, scoped to refs/heads/benchmark-data
    # (the long-lived benchmark-data branch) — narrower than the org-wide rule.
    crossplane.io/external-name: "ksail:14699634"
spec:
  managementPolicies: ["Observe"]
  forProvider:
    repository: ksail
    name: Restrict deletions
    target: branch
    enforcement: active
  providerConfigRef:
    kind: ProviderConfig
    name: default
---
apiVersion: repo.github.m.upbound.io/v1alpha1
kind: RepositoryRuleset
metadata:
  name: platform-require-merge-queue
  annotations:
    # platform's "Require merge queue" rule on the default branch (merge_queue is a
    # repo-only rule type; org rulesets cannot carry it).
    crossplane.io/external-name: "platform:5275020"
spec:
  managementPolicies: ["Observe"]
  forProvider:
    repository: platform
    name: Require merge queue
    target: branch
    enforcement: active
  providerConfigRef:
    kind: ProviderConfig
    name: default
